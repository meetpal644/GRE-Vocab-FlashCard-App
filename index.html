<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GRE Vocab Drill</title>
<style>
  :root{
    --bg:#EDF0F4; --card:#FFF; --ink:#1B2733; --muted:#5C6B7A; --line:#D7DEE6;
    --blue:#3454D1; --green:#1E8A5A; --green-bg:#E7F5EE; --red:#C0392B; --red-bg:#FBEAE7;
    --soft:#F3F6FA; --warn-bg:#FFF6E5; --warn-line:#EAD9AE;
  }
  html[data-theme="dark"]{
    --bg:#14181D; --card:#1D242C; --ink:#E8EAED; --muted:#96A3B1; --line:#333E4A;
    --blue:#7A93FF; --green:#3DC48F; --green-bg:#173528; --red:#EF7466; --red-bg:#3B221F;
    --soft:#242D37; --warn-bg:#332B18; --warn-line:#5A4C28;
  }
  html[data-theme="dark"] .btn{background:#3E5BE0; color:#fff}
  html{color-scheme:light dark}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100dvh; display:flex; flex-direction:column; align-items:center}
  header{width:100%; max-width:560px; display:flex; align-items:center;
    justify-content:space-between; padding:14px 18px 4px}
  .brand{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600}
  #score{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
  main{width:100%; max-width:560px; padding:10px 16px 40px; flex:1}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:0 1px 3px rgba(27,39,51,.06); padding:26px 20px; margin-bottom:14px}
  .label{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted)}
  #word{font-family:"Iowan Old Style",Georgia,serif; font-size:clamp(34px,9vw,46px);
    font-weight:600; margin:6px 0 4px; word-break:break-word}
  .rule{height:3px; width:56px; background:var(--blue); border-radius:2px; margin:2px 0 20px}
  button{font-family:inherit}
  .opt{display:block; width:100%; text-align:left; margin:10px 0; padding:14px;
    border:1.5px solid var(--line); border-radius:12px; background:var(--card);
    color:var(--ink); font-size:15.5px; line-height:1.4; cursor:pointer}
  .opt:active{background:var(--soft)}
  .opt.correct{border-color:var(--green); background:var(--green-bg)}
  .opt.wrong{border-color:var(--red); background:var(--red-bg)}
  .opt:disabled{cursor:default} .opt.dim:disabled{opacity:.55}
  #explain{margin-top:16px; padding:14px; border-radius:12px; font-size:14.5px;
    background:var(--soft); border:1px solid var(--line); display:none}
  .verdict{font-weight:700; margin-bottom:6px}
  .verdict.ok{color:var(--green)} .verdict.no{color:var(--red)}
  .btn{display:block; width:100%; margin-top:14px; padding:15px; border:0;
    border-radius:12px; background:var(--blue); color:#fff; font-size:16px;
    font-weight:600; cursor:pointer}
  .btn.ghost{background:var(--card); color:var(--ink); border:1.5px solid var(--line)}
  .btn.danger{background:var(--card); color:var(--red); border:1.5px solid var(--line)}
  .center{text-align:center; padding:60px 16px; color:var(--muted)}
  .spin{width:26px; height:26px; margin:0 auto 14px; border:3px solid var(--line);
    border-top-color:var(--blue); border-radius:50%; animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(1turn)}}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}}
  .stat{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:15px}
  .stat:last-child{border-bottom:0}
  .sess{padding:12px 0; border-bottom:1px solid var(--line)}
  .sess:last-child{border-bottom:0}
  .sess .top{display:flex; justify-content:space-between; gap:10px; font-size:15px}
  .pct{font-weight:700; font-variant-numeric:tabular-nums}
  .pct.good{color:var(--green)} .pct.bad{color:var(--red)}
  .when{color:var(--muted); font-size:13px; margin-top:2px}
  details{margin-top:6px} summary{font-size:13.5px; color:var(--blue); cursor:pointer}
  .wl{margin:8px 0 0; padding-left:18px; font-size:14px}
  .wl li{margin:4px 0} .wl b{font-family:Georgia,serif}
  small.note{color:var(--muted); display:block; margin-top:8px}
  .warn{background:var(--warn-bg); border:1px solid var(--warn-line); border-radius:10px; padding:10px 12px; font-size:13.5px; margin-top:12px}
  #theme{border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:8px; padding:4px 10px; font-size:15px; cursor:pointer; line-height:1.3}
  .hright{display:flex; align-items:center; gap:10px}
</style>
</head>
<body>
<header>
  <span class="brand">GRE Vocab Drill</span>
  <span class="hright"><span id="score"></span><button id="theme" title="Toggle dark mode">◐</button></span>
</header>
<main id="main"><div class="center"><div class="spin"></div>Loading words from your sheet…</div></main>

<script>
/* ---------- theme: follows system, manual toggle remembered ---------- */
(function(){
  let saved = null; try{ saved = localStorage.getItem("gre_theme"); }catch(e){}
  const sysDark = matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.dataset.theme = saved || (sysDark ? "dark" : "light");
})();
document.getElementById("theme").onclick = ()=>{
  const t = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = t;
  try{ localStorage.setItem("gre_theme", t); }catch(e){}
};

const SHEET_ID = "1aRTgPCr9kKnef0zyigvw7-SDVLD4x_8SW6MgCN675o8";
const TABS = ["Sheet1","Sheet2","Sheet3","Sheet5","Meet's additions"];
/* Paste your Apps Script Web App URL (ends in /exec) between the quotes: */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQXfVc1KuJnuCs4iBFHBKESZoSbP6HGoAwRQeizWLMOD1fXohBIzt44j-kUVq0NbSFjg/exec";
const $ = id => document.getElementById(id);
let WORDS = [], deck = [], ptr = 0, cur = null, S = null;
let tabCounts = {}, blankCount = 0, failedTabs = [], dupeCount = 0;

/* ---------- load all tabs directly from Google ---------- */
async function loadSheet(){
  $("main").innerHTML = '<div class="center"><div class="spin"></div>Loading words from your sheet…</div>';
  WORDS = []; failedTabs = []; tabCounts = {}; blankCount = 0; dupeCount = 0;
  const results = {};
  await Promise.all(TABS.map(async tab=>{
    try{
      const r = await fetch(csvURL(tab));
      if(!r.ok) throw 0;
      results[tab] = extractPairs(parseCSV(await r.text()));
    }catch(e){ failedTabs.push(tab); }
  }));
  // Merge in fixed TABS order so counts are stable and earlier tabs win duplicates
  const seen = new Set();
  for(const tab of TABS){
    if(!(tab in results)) continue;
    let raw = 0, uniq = 0;
    for(const p of results[tab]){
      if(p.blank){ blankCount++; continue; }
      raw++;
      const k = p.w.toLowerCase();
      if(seen.has(k)){ dupeCount++; continue; }
      seen.add(k); WORDS.push(p); uniq++;
    }
    tabCounts[tab] = {raw, uniq};
  }
  if(WORDS.length < 8){
    $("main").innerHTML = '<div class="center">⚠️ Couldn\'t load the sheet.<br>'+
      '<small class="note">Check the sheet is shared as “Anyone with the link — Viewer” and you\'re online. '+
      'Note: this page must be opened from its hosted URL, not as a local file or inside Claude.</small>'+
      '<button class="btn" style="max-width:200px;margin:16px auto 0" onclick="loadSheet()">Try again</button></div>';
    return;
  }
  home();
}
const csvURL = tab => "https://docs.google.com/spreadsheets/d/"+SHEET_ID+
  "/gviz/tq?tqx=out:csv&sheet="+encodeURIComponent(tab);

/* ---------- CSV + pair extraction ---------- */
function parseCSV(t){
  const rows=[[]]; let cur="", q=false;
  for(let i=0;i<t.length;i++){ const c=t[i];
    if(q){ if(c=='"'){ if(t[i+1]=='"'){cur+='"';i++} else q=false } else cur+=c }
    else{ if(c=='"') q=true;
      else if(c==','){ rows[rows.length-1].push(cur); cur="" }
      else if(c=='\n'){ rows[rows.length-1].push(cur); cur=""; rows.push([]) }
      else if(c!='\r') cur+=c } }
  rows[rows.length-1].push(cur); return rows;
}
const clean = s => s.replace(/^\d+\.\s*/,"").trim();
const bad = s => !s || /^(group\s*\d+|take test|for vocab)/i.test(s) || /https?:\/\//i.test(s);
function extractPairs(rows){
  const out=[];
  for(const r of rows) for(let i=0;i+1<r.length;i+=2){
    const w = clean(r[i]||""), m = clean(r[i+1]||"");
    if(bad(w) || w.length<2 || w.length>40 || w.split(/\s+/).length>3) continue;
    if(!m || m.length<3){ out.push({w, blank:true}); continue; } // word exists, meaning missing
    if(bad(m)) continue;
    out.push({w,m});
  }
  return out;
}

/* ---------- deck: shuffle all, deal through, reshuffle (equal exposure) ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let reviewPool = null; // array of word objects when in review mode, else null
function nextWord(){
  const src = reviewPool || WORDS;
  if(ptr>=deck.length){ deck=shuffle(src.map((_,i)=>i)); ptr=0; }
  return src[deck[ptr++]];
}

/* ---------- screens ---------- */
function home(){
  S = null; $("score").textContent = "";
  const tabs = TABS.filter(t=>tabCounts[t]).map(t=>{
    const c = tabCounts[t];
    return '<div class="stat"><span>'+t+'</span><b>'+c.raw+' found · '+c.uniq+' new</b></div>';
  }).join("");
  $("main").innerHTML =
    '<div class="card"><div class="label">Word pool</div>'+
    '<div id="word" style="font-size:30px">'+WORDS.length+' unique words</div><div class="rule"></div>'+
    tabs+
    '<div class="stat"><span>Duplicates across tabs</span><b>'+dupeCount+'</b></div>'+
    '<div class="stat"><span>Skipped (no meaning yet)</span><b>'+blankCount+'</b></div>'+
    (failedTabs.length?'<div class="warn">Couldn\'t load tab(s): <b>'+failedTabs.join(", ")+
      '</b> — check the exact tab name spelling in the TABS list.</div>':"")+
    (!SCRIPT_URL?'<div class="warn">Cloud analytics not set up yet — sessions won\'t be saved. '+
      'Paste your Apps Script URL into SCRIPT_URL in this file.</div>':"")+
    '<button class="btn" onclick="startQuiz()">Start quiz</button>'+
    '<button class="btn ghost" onclick="startReview()">🔁 Review my wrong words</button>'+
    '<button class="btn ghost" onclick="analytics()">📊 Analytics</button>'+
    '<button class="btn ghost" onclick="loadSheet()">↻ Sync sheet</button></div>';
}
function startQuiz(){
  reviewPool = null;
  S = { ts: Date.now(), answered: 0, right: 0, wrong: [] };
  deck = shuffle(WORDS.map((_,i)=>i)); ptr = 0;
  renderQuizShell("What does this word mean?");
  ask();
}

/* ---------- review mode: quiz only words previously gotten wrong ---------- */
async function fetchWrongWords(){
  const wrong = new Map(); // key: lowercase word -> {w, m}
  try{
    const r = await fetch(csvURL("Sessions"));
    if(r.ok){
      for(const row of parseCSV(await r.text())){
        let list = []; try{ list = JSON.parse(row[5]||"[]"); }catch(e){}
        for(const x of list){
          if(x && x.w) wrong.set(x.w.toLowerCase(), {w:x.w, m:x.m});
        }
      }
    }
  }catch(e){}
  // Prefer the current sheet's meaning if the word still exists there (keeps it fresh)
  const byWord = new Map(WORDS.map(o=>[o.w.toLowerCase(), o]));
  const out = [];
  for(const [k,v] of wrong){ out.push(byWord.get(k) || v); }
  return out;
}
async function startReview(){
  $("main").innerHTML = '<div class="center"><div class="spin"></div>Gathering your wrong words…</div>';
  const words = await fetchWrongWords();
  if(words.length < 1){
    $("main").innerHTML = '<div class="card"><div class="label">Nothing to review</div>'+
      '<div id="word" style="font-size:26px">No wrong words yet</div><div class="rule"></div>'+
      '<small class="note">Finish some quizzes first — any word you miss gets collected here automatically.</small>'+
      '<button class="btn ghost" onclick="home()">← Home</button></div>';
    return;
  }
  reviewPool = shuffle(words);
  S = { ts: Date.now(), answered: 0, right: 0, wrong: [], review: true };
  deck = shuffle(reviewPool.map((_,i)=>i)); ptr = 0;
  renderQuizShell("Review · "+reviewPool.length+" word"+(reviewPool.length==1?"":"s")+" you missed");
  ask();
}

function renderQuizShell(label){
  $("main").innerHTML =
    '<div class="card"><div class="label">'+label+'</div>'+
    '<div id="word"></div><div class="rule"></div><div id="opts"></div>'+
    '<div id="explain"></div><button class="btn" id="next" style="display:none">Next word →</button></div>'+
    '<button class="btn danger" onclick="endQuiz()">■ End quiz &amp; save session</button>';
  $("next").onclick = ask;
}
function ask(){
  const q = nextWord();
  const pool = shuffle(WORDS.filter(x=>x!==q && x.m.toLowerCase()!==q.m.toLowerCase()).slice());
  const opts = shuffle([q, ...pool.slice(0,3)]);
  cur = {q, opts};
  $("word").textContent = q.w;
  $("explain").style.display="none"; $("next").style.display="none";
  $("opts").innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="opt"; b.textContent=o.m; b.onclick=()=>answer(o,b);
    $("opts").appendChild(b);
  });
  updateScore();
}
function answer(picked,btn){
  const {q,opts}=cur;
  S.answered++; const ok = picked===q;
  if(ok) S.right++; else S.wrong.push({w:q.w, m:q.m, picked:picked.w});
  [...$("opts").children].forEach((b,i)=>{
    b.disabled=true;
    if(opts[i]===q) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const others = opts.filter(o=>o!==q).map(o=>"“"+o.w+"”").join(", ");
  $("explain").innerHTML = (ok
    ? '<div class="verdict ok">✓ Correct</div>'
    : '<div class="verdict no">✗ Not quite — you picked the meaning of “'+picked.w+'”</div>')+
    '<b>'+q.w+'</b> = '+q.m+'.<br><small>This is the only matching option: each other choice '+
    'is the definition of a different word ('+others+').</small>';
  $("explain").style.display="block"; $("next").style.display="block";
  updateScore();
}
function updateScore(){ $("score").textContent = S ? S.right+" / "+S.answered+" correct" : ""; }

/* ---------- end quiz: save session to the Google Sheet ---------- */
async function endQuiz(){
  if(!S || !S.answered) return home();
  let saved = false;
  if(SCRIPT_URL){
    try{
      await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors",
        body: JSON.stringify({ts:S.ts, answered:S.answered, right:S.right, wrong:S.wrong})});
      saved = true;
    }catch(e){}
  }
  const pct = Math.round(100*S.right/S.answered);
  $("main").innerHTML =
    '<div class="card"><div class="label">'+(saved?'Session saved to your sheet':'Session finished (not saved)')+'</div>'+
    '<div id="word" style="font-size:30px">'+pct+'% correct</div><div class="rule"></div>'+
    '<div class="stat"><span>Answered</span><b>'+S.answered+'</b></div>'+
    '<div class="stat"><span>Correct</span><b>'+S.right+'</b></div>'+
    '<div class="stat"><span>Wrong</span><b>'+S.wrong.length+'</b></div>'+
    (S.wrong.length?'<details open><summary>Words to review</summary><ul class="wl">'+
      S.wrong.map(x=>'<li><b>'+x.w+'</b> — '+x.m+'</li>').join("")+'</ul></details>':"")+
    '<button class="btn" onclick="startQuiz()">Start another</button>'+
    '<button class="btn ghost" onclick="analytics()">📊 Analytics</button>'+
    '<button class="btn ghost" onclick="home()">Home</button></div>';
  $("score").textContent=""; S=null;
}

/* ---------- analytics: read the Sessions tab back from the sheet ---------- */
async function analytics(){
  $("main").innerHTML = '<div class="center"><div class="spin"></div>Loading sessions from your sheet…</div>';
  let all = [];
  try{
    const r = await fetch(csvURL("Sessions"));
    if(r.ok){
      const rows = parseCSV(await r.text());
      for(const row of rows){
        const ts = Number(String(row[0]||"").replace(/[^\d]/g,""));
        const answered = +row[2], right = +row[3];
        if(!ts || !answered) continue; // skips header/empty rows
        let wrong = []; try{ wrong = JSON.parse(row[5]||"[]"); }catch(e){}
        all.push({ts, answered, right, wrong});
      }
    }
  }catch(e){}
  all.sort((a,b)=>b.ts-a.ts);
  const tot = all.reduce((a,s)=>a+s.answered,0), rt = all.reduce((a,s)=>a+s.right,0);
  let html = '<div class="card"><div class="label">Analytics — synced from your sheet</div>'+
    '<div id="word" style="font-size:30px">'+all.length+' session'+(all.length==1?"":"s")+'</div><div class="rule"></div>'+
    '<div class="stat"><span>Total answered</span><b>'+tot+'</b></div>'+
    '<div class="stat"><span>Overall accuracy</span><b>'+(tot?Math.round(100*rt/tot)+"%":"—")+'</b></div></div>';
  html += '<div class="card">'+(all.length ? all.map(s=>{
    const pct = Math.round(100*s.right/s.answered);
    return '<div class="sess"><div class="top"><span>'+s.right+' / '+s.answered+' correct</span>'+
      '<span class="pct '+(pct>=70?"good":"bad")+'">'+pct+'%</span></div>'+
      '<div class="when">'+new Date(s.ts).toLocaleString()+'</div>'+
      (s.wrong.length?'<details><summary>'+s.wrong.length+' wrong — review</summary><ul class="wl">'+
        s.wrong.map(x=>'<li><b>'+x.w+'</b> — '+x.m+' <small class="note" style="display:inline">(picked “'+x.picked+'”)</small></li>').join("")+
        '</ul></details>':'<small class="note">Perfect session 🎉</small>')+'</div>';
  }).join("") : '<small class="note">No sessions found. '+(SCRIPT_URL?
      'Finish a quiz with “End quiz” and it\'ll appear here (and in the Sessions tab of your sheet).':
      'Set up the Apps Script first — see the setup instructions.')+'</small>')+'</div>';
  html += '<button class="btn ghost" onclick="home()">← Home</button>';
  $("main").innerHTML = html; $("score").textContent="";
}

loadSheet();
</script>
</body>
</html>
